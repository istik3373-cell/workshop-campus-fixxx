<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Workshop</title>

<link rel="stylesheet" href="css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<div class="container">

    <!-- LEFT -->
    <div class="left-side">

        <div class="content">

            <h1>
                Workshop Campus
            </h1>

            <p>
                Platform modern untuk pendaftaran workshop kampus berbasis web dengan tampilan futuristik dan interaktif.
            </p>

            <div class="socials">

                <div class="circle">
                    <i class="fa-brands fa-instagram"></i>
                </div>

                <div class="circle">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>

                <div class="circle">
                    <i class="fa-brands fa-discord"></i>
                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="right-side">

        <div class="login-box">

            <h2>Login</h2>

            <span class="sub">
                Welcome back 👋
            </span>

            <form id="loginForm">

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input type="email"
                    placeholder="Masukkan Email"
                    required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                    placeholder="Masukkan Password"
                    required>

                </div>
                <div class="input-box">

    <i class="fa-solid fa-user"></i>

    <select id="role" required>

        <option value="">
            Pilih Login Sebagai
        </option>

        <option value="admin">
            Admin
        </option>

        <option value="peserta">
            Peserta
        </option>

    </select>

</div>

                <div class="remember">

                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#">
                        Forgot password?
                    </a>

                </div>

                <button type="submit">
                    Login Sekarang
                </button>

            </form>

            <div class="register">

                Belum punya akun?
                <a href="#">Daftar</a>

            </div>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
