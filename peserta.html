<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Peserta</title>
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="bg"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo"><h2>Workshop</h2></div>
    <ul>
        <a href="dashboard.html"><li><i class="fa-solid fa-chart-line"></i> Dashboard</li></a>
        <a href="peserta.html"><li class="active"><i class="fa-solid fa-users"></i> Peserta</li></a>
        <a href="absensi.html"><li><i class="fa-solid fa-calendar-check"></i> Absensi</li></a>
        <a href="sertifikat.html"><li><i class="fa-solid fa-award"></i> Sertifikat</li></a>
        <a href="index.html"><li><i class="fa-solid fa-right-from-bracket"></i> Logout</li></a>
    </ul>
</div>

<!-- CONTENT -->
<div class="main-content">
    <div class="topbar">
        <div class="title">
            <h1>Data Peserta</h1>
            <p>Daftar peserta workshop kampus</p>
        </div>
    </div>

    <div class="table-box">
        <div class="table-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <input type="text" id="searchPeserta" placeholder="🔍 Cari peserta..." class="search-box" style="padding:8px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:260px;">
            <span id="jumlahPeserta" style="font-size:13px;color:#666;"></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Workshop</th>
                </tr>
            </thead>
            <tbody id="bodyPeserta">
                <tr><td colspan="4" style="text-align:center;color:#999;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="js/peserta.js"></script>
<script>
// Update jumlah peserta
const data = JSON.parse(localStorage.getItem("peserta")) || [];
document.getElementById("jumlahPeserta").textContent = `Total: ${data.length} peserta`;
</script>
</body>
</html>
